<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </div>
      <h2>AgenciaWeb</h2>
      <p>Gestión de Empleo Inteligente</p>
    </div>

    <!-- Tabs selector -->
    <div class="login-tabs">
      <button 
        type="button" 
        class="tab-btn" 
        [class.active]="activeTab() === 'password'" 
        (click)="setTab('password')">
        Contraseña
      </button>
      <button 
        type="button" 
        class="tab-btn" 
        [class.active]="activeTab() === 'biometric'" 
        (click)="setTab('biometric')">
        Rostro Biométrico
      </button>
    </div>

    <!-- General Error Banner -->
    @if (errorMessage()) {
      <div class="alert-message alert-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="17"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- TAB 1: Password Login Form -->
    @if (activeTab() === 'password') {
      <form (submit)="onPasswordSubmit($event)">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="nombre@empresa.com" 
            required
            [value]="email()"
            (input)="onEmailChange($event)"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••••" 
            required
            [value]="password()"
            (input)="onPasswordChange($event)"
          />
        </div>

        <button 
          type="submit" 
          class="btn btn-primary" 
          style="width: 100%; margin-top: 10px;"
          [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="spinner" style="width: 16px; height: 16px; border-width: 2px; border-top-color: white;"></span>
            Ingresando...
          } @else {
            Iniciar Sesión
          }
        </button>
      </form>
    }

    <!-- TAB 2: Biometric Facial Login Form -->
    @if (activeTab() === 'biometric') {
      <div class="camera-section">
        <!-- We still need their email to look up the embedding in FastAPI/SpringBoot -->
        <div class="form-group" style="width: 100%;">
          <label class="form-label" for="bio-email">Tu Correo Electrónico</label>
          <input 
            type="email" 
            id="bio-email" 
            class="form-input" 
            placeholder="nombre@empresa.com" 
            [value]="email()"
            (input)="onEmailChange($event)"
          />
        </div>

        <div class="webcam-wrapper">
          @if (isCameraActive()) {
            <video #videoElement class="webcam-video" autoplay playsinline></video>
            <div class="scanner-overlay"></div>
          } @else {
            <div class="camera-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span>Cámara Apagada</span>
            </div>
          }
        </div>

        <canvas #canvasElement class="canvas-hidden" width="300" height="300"></canvas>

        <div class="camera-controls">
          @if (!isCameraActive()) {
            <button 
              type="button" 
              class="btn btn-secondary" 
              style="width: 100%;"
              (click)="startCamera()">
              Activar Cámara
            </button>
          } @else {
            <button 
              type="button" 
              class="btn btn-primary" 
              style="width: 100%;"
              [disabled]="isLoading() || !email()"
              (click)="captureAndLogin()">
              @if (isLoading()) {
                <span class="spinner" style="width: 16px; height: 16px; border-width: 2px; border-top-color: white;"></span>
                Autenticando Rostro...
              } @else {
                Capturar e Ingresar
              }
            </button>
            <button 
              type="button" 
              class="btn btn-secondary" 
              style="width: 100%;"
              (click)="stopCamera()">
              Apagar Cámara
            </button>
          }
        </div>
      </div>
    }
  </div>
</div>
